name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build site
        env:
          SUNFEST_SITE_URL: https://mim21.github.io/sunfest
        run: python pipeline.py

      - name: Deploy output to public repo
        env:
          PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAGES_DEPLOY_TOKEN}@github.com/mim21/sunfest.git _public
          cp index.html calendar.ics _public/
          cp -r events _public/
          cd _public
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html calendar.ics events/
          git diff --cached --quiet || git commit -m "Auto-build [skip ci]"
          git push
