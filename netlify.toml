[build]
  command   = "python pipeline.py"
  publish   = "."

[build.environment]
  PYTHON_VERSION = "3.12"

# ICS feeds: correct MIME type so calendar apps accept them; 1-hour cache so
# subscribers pick up changes within an hour without hammering the CDN.
[[headers]]
  for = "/*.ics"
  [headers.values]
    Content-Type  = "text/calendar; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/events/*.ics"
  [headers.values]
    Content-Type  = "text/calendar; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
